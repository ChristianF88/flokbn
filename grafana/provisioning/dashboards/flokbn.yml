# Provisioned dashboard provider (FLOKBN-045) — loads every JSON dashboard
# from /var/lib/grafana/dashboards (mounted from grafana/dashboards/).
apiVersion: 1

providers:
  - name: flokbn
    folder: ""
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
