# prometheus-nginxlog-exporter config (CIDRX-045 firewall overlay).
# Tails the proxy's FULL access log (every request incl. denied 403s) and
# exposes nginx_http_response_count_total{method,status} on :4040 so the
# deny is visible in Grafana. The format must match nginx's stock "main"
# log_format used by proxy/default.conf.
listen:
  port: 4040

namespaces:
  - name: nginx
    format: "$remote_addr - $remote_user [$time_local] \"$request\" $status $body_bytes_sent \"$http_referer\" \"$http_user_agent\" \"$http_x_forwarded_for\""
    source:
      files:
        - /var/log/nginx/access_full.log
    labels:
      service: proxy
    histogram_buckets: [0.005, 0.05, 0.5, 1]
    # Low-cardinality client-subnet label (172.16.16.7 -> 172.16.16.0/24)
    # so Grafana can show per-attacker-network traffic and denies.
    relabel_configs:
      - target_label: subnet
        from: remote_addr
        matches:
          - regexp: "^(\\d+\\.\\d+\\.\\d+)\\.\\d+$"
            replacement: "$1.0/24"
