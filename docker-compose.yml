services:
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: proxy
    restart: unless-stopped
    ports:
    - '80'
    volumes:
    - /tmp:/var/log/nginx:rw
    networks: &id001
      net1: {}
      net2: {}
      net3: {}
      net4: {}
  cidrx:
    build:
      context: ./cidrx
      dockerfile: Dockerfile
    container_name: cidrx
    restart: unless-stopped
    ports:
    - 9000:9000
    - 8666:8666
    volumes:
    - ./docker-test-config.toml:/config/cidrx.toml:ro
    - cidrx_data:/data
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O
      - /dev/null
      - http://127.0.0.1:8666/stats
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks: *id001
  filebeat:
    build:
      context: ./filebeat
      dockerfile: Dockerfile
    container_name: filebeat
    user: root
    depends_on:
    - proxy
    - cidrx
    restart: unless-stopped
    networks: *id001
    volumes:
    - /tmp:/var/log/nginx:ro
    - filebeat_data:/usr/share/filebeat/data
    environment:
      INGESTOR_HOST: cidrx:9000
      PROXY_CONTAINER_NAME: proxy
  clients_net1:
    build: &id002
      context: ./client
      dockerfile: Dockerfile
    container_name: clients_net1
    depends_on:
    - proxy
    cap_add:
    - NET_ADMIN
    networks:
      net1:
        ipv4_address: 172.16.1.32
    environment:
      TARGET_URL: http://proxy:80/
      INTERVAL: 0.1
      IP_BASE: 172.16.1
      IP_START: 32
      COUNT: 4
  clients_net2:
    build: *id002
    container_name: clients_net2
    depends_on:
    - proxy
    cap_add:
    - NET_ADMIN
    networks:
      net2:
        ipv4_address: 172.16.2.32
    environment:
      TARGET_URL: http://proxy:80/
      INTERVAL: 0.1
      IP_BASE: 172.16.2
      IP_START: 32
      COUNT: 2
  clients_net3:
    build: *id002
    container_name: clients_net3
    depends_on:
    - proxy
    cap_add:
    - NET_ADMIN
    networks:
      net3:
        ipv4_address: 172.16.3.32
    environment:
      TARGET_URL: http://proxy:80/
      INTERVAL: 0.1
      IP_BASE: 172.16.3
      IP_START: 32
      COUNT: 5
  clients_net4:
    build: *id002
    container_name: clients_net4
    depends_on:
    - proxy
    cap_add:
    - NET_ADMIN
    networks:
      net4:
        ipv4_address: 172.16.16.32
    environment:
      TARGET_URL: http://proxy:80/
      INTERVAL: 0.07
      IP_BASE: 172.16.16
      IP_START: 32
      COUNT: 33
networks:
  net1:
    driver: bridge
    ipam:
      driver: default
      config:
      - subnet: 172.16.1.0/24
        ip_range: 172.16.1.0/27
  net2:
    driver: bridge
    ipam:
      driver: default
      config:
      - subnet: 172.16.2.0/24
        ip_range: 172.16.2.0/27
  net3:
    driver: bridge
    ipam:
      driver: default
      config:
      - subnet: 172.16.3.0/24
        ip_range: 172.16.3.0/27
  net4:
    driver: bridge
    ipam:
      driver: default
      config:
      - subnet: 172.16.16.0/24
        ip_range: 172.16.16.0/27
volumes:
  filebeat_data: {}
  cidrx_data: {}
