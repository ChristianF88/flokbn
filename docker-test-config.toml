# cidrx Docker TEST configuration (mounted by docker-compose.test.yml)
# Fast detection for the e2e suites; the paced demo variant is
# docker-test-config.demo.toml
# It's designed to detect the clustering patterns from the test clients

[global]
jailFile = "/data/jail.json"
banFile = "/data/blocklist.txt"

[log]
# Leveled log lines on stderr (visible via `docker compose logs cidrx`).
level = "info"
format = "text"

[live]
port = "9000"
# HTTP stats endpoints (GET /stats, GET /bans).
# 0.0.0.0 bind is the documented exception to the localhost-only default:
# required so the published port is reachable from the host across the
# isolated compose network.
# While the stack runs:  curl http://localhost:8666/stats
#                        curl http://localhost:8666/bans
statsListen = "0.0.0.0:8666"
topTalkers = 5

[live.general_detection]
# Detect net1 (4 IPs: 172.16.1.32-35)
# Detect net2 (2 IPs: 172.16.2.32-33)
# Detect net3 (5 IPs: 172.16.3.32-36)
# min_size=50 still catches the smallest cluster: net2's 2 IPs at 0.1s
# interval send ~20 req/s, i.e. ~200 requests per 10s window. The negative
# client (172.30.99.32, 1 req/3s, ~3-6 requests per window) stays far below.
# Negative-client expectation: 172.30.99.32 must never appear in jail/ban
# output; the e2e suites assert this.
slidingWindowMaxTime = "5m"
slidingWindowMaxSize = 10000
sleepBetweenIterations = 1
clusterArgSets = [
    [50, 24, 32, 0.2],  # Detect small clusters (50+ requests)
]
useForJail = [true]

[live.aggressive_detection]
# Detect net4 (33 IPs: 172.16.16.32-64) - the main attack cluster
slidingWindowMaxTime = "2m"
slidingWindowMaxSize = 5000
sleepBetweenIterations = 1
clusterArgSets = [
    [10, 20, 28, 0.15], # Detect medium clusters (10+ IPs)
    [20, 16, 24, 0.2],  # Detect larger networks (20+ IPs)
]
useForJail = [true, true]
