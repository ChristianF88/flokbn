# Denied requests (403 from the banpoller's deny rules) are kept out of the
# shipped access.log so cidrx stops seeing banned traffic — the sliding
# window decays, the ban expires, traffic reappears, gets re-banned: a full
# closed loop. The full log records EVERY request (incl. 403s) for the
# nginx-log-exporter so the deny is visible in Grafana.
map $status $loggable {
    403     0;
    default 1;
}

server {
    listen       80;
    server_name  _;

    # deny <cidr>; lines maintained by banpoller.sh (empty by default).
    include /etc/nginx/banned/deny.conf;

    access_log /var/log/nginx/access.log main if=$loggable;
    access_log /var/log/nginx/access_full.log main;

    root /usr/share/nginx/html;

    # Served as a static file, NOT `return 200`: return runs in the rewrite
    # phase, before the access phase, and would bypass the deny rules.
    location / {
        try_files /index.html =404;
    }

    location /forbidden {
        return 403 'forbidden';
    }
}
